{% load static %}
<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light dark" />
  <title>4000 Essential Words</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="{% static 'css/app.css' %}" />
  <style>
    @keyframes a-fadeup { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:none } }
    @keyframes a-pop { 0% { transform:scale(.7); opacity:0 } 60% { transform:scale(1.08) } 100% { transform:scale(1); opacity:1 } }
    @keyframes a-shake { 10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)} 30%,50%,70%{transform:translateX(-7px)} 40%,60%{transform:translateX(7px)} }
    @keyframes a-flip { from { transform:rotateY(90deg) } to { transform:rotateY(0) } }
    @keyframes a-pulse { 0%{box-shadow:0 0 0 0 rgba(52,211,153,.55)} 100%{box-shadow:0 0 0 14px rgba(52,211,153,0)} }
    .a-fadeup { animation: a-fadeup .32s cubic-bezier(.2,.8,.2,1) both }
    .a-pop { animation: a-pop .42s cubic-bezier(.2,1.25,.4,1) both }
    .a-shake { animation: a-shake .4s both }
    .a-flip { animation: a-flip .28s ease-out both }
    .a-correct { animation: a-pop .3s both, a-pulse .55s ease-out }
    @keyframes a-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
    @keyframes a-ring { 0%,100%{box-shadow:0 0 0 0 rgba(129,140,248,.5)} 50%{box-shadow:0 0 0 12px rgba(129,140,248,0)} }
    .node-face { transition: transform .12s ease }
    .node-wrap:active .node-face { transform: scale(.9) }
    .node-cur .node-face { animation: a-bob 1.5s ease-in-out infinite, a-ring 2s ease-in-out infinite }
    @keyframes a-listen { 0%,100%{box-shadow:0 0 0 0 rgba(108,92,231,.6)} 50%{box-shadow:0 0 0 20px rgba(108,92,231,0)} }
    .a-listen { animation: a-listen 1.1s ease-in-out infinite }
    @media (prefers-reduced-motion: reduce) {
      .a-fadeup,.a-pop,.a-shake,.a-flip,.a-correct,.node-cur .node-face,.a-listen { animation: none !important }
    }

    /* ===== Redesign: own "highlighter gold" identity (overrides Telegram's borrowed accent) ===== */
    :root {
      --accent: #e6a700;        /* gold fill */
      --accent-ink: #241a00;    /* dark text ON gold — 8:1, never white */
      --accent-deep: #b07d00;   /* gold for icons / marks / large text */
      --ok: #10b981;            /* mastered / done (semantic, not brand) */
      --mark: color-mix(in srgb, #e6a700 40%, transparent);
    }
    /* gold TEXT uses the deeper shade (readable on light); gold FILLS stay bright */
    .text-accent { color: var(--accent-deep); }
    /* signature: the highlighter swipe — one bold thing per screen, quiet elsewhere */
    .hl { background: linear-gradient(180deg, transparent 56%, var(--mark) 56%, var(--mark) 92%, transparent 92%); padding: 0 .06em; border-radius: 2px; }
    .sect-mark { position: relative; display: inline-block; }
    .sect-mark::after { content: ""; position: absolute; left: 0; right: 0; bottom: 1px; height: 7px; background: var(--mark); border-radius: 4px; z-index: -1; transform: rotate(-.7deg); }
    /* active tab = highlighter underline (setTab toggles .text-accent) */
    .js-tab { position: relative; }
    .js-tab.text-accent::before { content: ""; position: absolute; top: 0; left: 26%; right: 26%; height: 3px; border-radius: 0 0 4px 4px; background: var(--accent); }
    /* dashboard "report" */
    .dh-hero { background: var(--card); border: 1px solid var(--line); border-radius: 20px; padding: 20px; }
    .dh-streak { font-size: 52px; font-weight: 800; letter-spacing: -.04em; line-height: .9; position: relative; display: inline-block; font-variant-numeric: tabular-nums; }
    .dh-streak .swipe { position: absolute; left: -5px; right: -5px; bottom: 6px; height: 15px; background: var(--mark); border-radius: 6px; transform: rotate(-1.6deg); z-index: -1; }
    .dh-mini { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
    .dh-mini > div { border: 1px solid var(--line); border-radius: 14px; padding: 12px 14px; }
    .dh-card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 16px; }
    .dh-trend { display: flex; align-items: flex-end; gap: 3px; height: 72px; padding-top: 8px; }
    .dh-trend .b { flex: 1; background: color-mix(in srgb, var(--accent) 60%, transparent); border-radius: 3px 3px 2px 2px; min-height: 3px; }
    .dh-trend .b.now { background: var(--accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 24%, transparent); }
    .dh-cal { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
    .dh-cal i { aspect-ratio: 1; border-radius: 4px; background: var(--line); }
    .dh-cal i.done { background: var(--ok); }
    .dh-cal i.part { background: var(--accent); }
    .dh-rev { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-top: 1px solid var(--line); }
    .dh-rev.first { border-top: 0; }
    .dh-miss { font-size: 12px; font-weight: 700; color: #e5484d; background: color-mix(in srgb, #e5484d 12%, transparent); padding: 3px 9px; border-radius: 999px; }
    .tnum { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body class="font-sans antialiased">
  <header class="sticky top-0 z-20 bg-surface border-b border-line">
    <div class="px-4 pt-3 pb-2 flex items-center gap-2.5">
      <button id="backbtn" class="hidden shrink-0 grid h-9 w-9 place-items-center rounded-full bg-card border border-line text-ink active:scale-90 transition" aria-label="Orqaga">
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3"><path d="m15 18-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="min-w-0 flex-1">
        <h1 id="title" class="text-[19px] font-bold tracking-tight leading-tight truncate">Kitoblar</h1>
        <p id="subtitle" class="text-xs text-muted mt-0.5 truncate">4000 Essential Words</p>
      </div>
    </div>
    <div id="searchbar" class="px-4 pb-3">
      <label class="flex items-center gap-2.5 rounded-2xl bg-card border border-line px-3.5 py-2.5">
        <svg class="h-4 w-4 text-muted shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7" /><path d="m21 21-4.3-4.3" stroke-linecap="round" />
        </svg>
        <input id="search" type="search" enterkeyhint="search" autocomplete="off"
               placeholder="So'z qidirish — en yoki uz…"
               class="w-full bg-transparent outline-none text-[15px] text-ink placeholder:text-muted" />
      </label>
    </div>
  </header>

  <main id="content" class="px-4 py-4 pb-24 space-y-3"></main>

  <nav class="fixed bottom-0 inset-x-0 z-20 bg-surface border-t border-line flex">
    <button data-tab="books" class="js-tab flex-1 flex flex-col items-center gap-0.5 py-2.5 text-[11px]">
      <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v14a2 2 0 0 0-2-2H6a2 2 0 0 1-2-2Z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Kitoblar</button>
    <button data-tab="today" class="js-tab flex-1 flex flex-col items-center gap-0.5 py-2.5 text-[11px]">
      <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18" stroke-linecap="round"/></svg>
      Bugun</button>
    <button data-tab="games" class="js-tab flex-1 flex flex-col items-center gap-0.5 py-2.5 text-[11px]">
      <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 11h4m-2-2v4m5-1h.01M18 12h.01M17 5a4 4 0 0 1 4 4v.5a6.5 6.5 0 0 1-6.5 6.5c-1 0-1.9-.5-2.5-1.3-.6.8-1.5 1.3-2.5 1.3A6.5 6.5 0 0 1 3 9.5V9a4 4 0 0 1 4-4Z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Mashqlar</button>
    <button data-tab="profile" class="js-tab flex-1 flex flex-col items-center gap-0.5 py-2.5 text-[11px]">
      <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0" stroke-linecap="round"/></svg>
      Profil</button>
  </nav>

  <script>
    const tg = window.Telegram ? window.Telegram.WebApp : null;
    if (tg) { tg.ready(); tg.expand(); }
    const initData = tg && tg.initData ? tg.initData : "";

    const titleEl = document.getElementById("title");
    const subtitleEl = document.getElementById("subtitle");
    const contentEl = document.getElementById("content");
    const searchEl = document.getElementById("search");
    const searchbarEl = document.getElementById("searchbar");
    const backBtnEl = document.getElementById("backbtn");

    let tab = "books";
    let booksCache = null;

    const POS = {
      "n.": "bg-blue-500/15 text-blue-400", "v.": "bg-emerald-500/15 text-emerald-400",
      "adj.": "bg-amber-500/15 text-amber-400", "adv.": "bg-rose-500/15 text-rose-400",
      "pron.": "bg-violet-500/15 text-violet-400", "prep.": "bg-cyan-500/15 text-cyan-400",
    };
    const posClass = (p) => POS[p] || "bg-slate-500/15 text-slate-400";
    const BOOK_GRAD = [
      "from-indigo-500 to-fuchsia-600", "from-sky-500 to-blue-600",
      "from-emerald-500 to-teal-600", "from-amber-500 to-orange-600",
      "from-rose-500 to-pink-600", "from-violet-500 to-purple-600",
    ];
    const esc = (s) => (s || "").replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    // Escape everything, then restore a tiny allowlist of inline tags so the
    // book's bold target word (<strong>) renders, while all else stays safe.
    const richText = (s) => esc(s).replace(/&lt;(\/?)(b|strong|i|em)&gt;/gi, "<$1$2>");
    const shuffle = (a) => a.map((x) => [Math.random(), x]).sort((p, q) => p[0] - q[0]).map((x) => x[1]);

    async function getJSON(url) {
      // Carry initData so authed endpoints (e.g. units → learned counts) can identify the user.
      const res = await fetch(url, initData ? { headers: { "X-Telegram-Init-Data": initData } } : {});
      if (!res.ok) throw new Error(res.status);
      return res.json();
    }
    async function books() {
      if (!booksCache) booksCache = (await getJSON("api/books/")).books;
      return booksCache;
    }
    function speak(text) {
      if (!window.speechSynthesis) return;
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "en-US";
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    }

    // Navigation: one back action driving BOTH the in-app header button (works
    // in any browser) and Telegram's native BackButton (when inside Telegram).
    let _backFn = null;
    function goBack() { if (_backFn) _backFn(); }
    function setBack(fn) {
      _backFn = fn;
      backBtnEl.classList.toggle("hidden", !fn);
      if (tg && tg.BackButton) { fn ? tg.BackButton.show() : tg.BackButton.hide(); }
    }
    backBtnEl.addEventListener("click", goBack);
    if (tg && tg.BackButton) tg.BackButton.onClick(goBack);
    function setHeader(t, s) { titleEl.textContent = t; subtitleEl.textContent = s; }
    function setContent(cls, html) {
      contentEl.className = cls; contentEl.innerHTML = html;
      contentEl.classList.remove("a-fadeup"); void contentEl.offsetWidth; contentEl.classList.add("a-fadeup");
    }
    function loading() { setContent("px-4 py-16 text-center text-sm text-muted", "Yuklanmoqda…"); }
    function message(t) { setContent("px-4 py-16 text-center text-sm text-muted", esc(t)); }

    // ---- learned state (server when authed; CloudStorage/localStorage else) -
    const SHARDS = 8;
    let learned = new Set();

    async function apiLearned(method, body) {
      const res = await fetch("/webapp/api/learned/", {
        method,
        headers: { "Content-Type": "application/json", "X-Telegram-Init-Data": initData },
        body: body ? JSON.stringify(body) : undefined,
      });
      if (!res.ok) throw new Error(res.status);
      return res.json();
    }

    function loadLearned(done) {
      if (initData) {
        apiLearned("GET")
          .then((d) => { learned = new Set((d.ids || []).map(String)); })
          .catch(() => { learned = new Set(); })
          .finally(() => done && done());
      } else if (tg && tg.CloudStorage) {
        const keys = Array.from({ length: SHARDS }, (_, i) => "learned_" + i);
        tg.CloudStorage.getItems(keys, (e, items) => {
          learned = new Set();
          if (items) Object.values(items).forEach((v) => (v || "").split(",").filter(Boolean).forEach((x) => learned.add(x)));
          done && done();
        });
      } else {
        learned = new Set((localStorage.getItem("learned") || "").split(",").filter(Boolean));
        done && done();
      }
    }
    const speakerSvg = '<svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5 6 9H3v6h3l5 4V5Z" stroke-linejoin="round"/><path d="M15.5 8.5a5 5 0 0 1 0 7M18 6a9 9 0 0 1 0 12" stroke-linecap="round"/></svg>';

    // Essential-book style entry: circular image · green word [ipa] (pos) · red uz · definition · → example.
    // Learned state is read-only (earned only by tests) — a subtle emerald ring, no manual toggle.
    function wordCard(w) {
      const on = learned.has(String(w.id));
      const img = w.image
        ? `<img src="${w.image}" alt="" loading="lazy" decoding="async" onload="this.style.opacity=1" class="h-14 w-14 rounded-full object-cover ring-1 ring-line shrink-0" style="opacity:0;transition:opacity .35s ease;background:var(--card)">`
        : `<div class="h-14 w-14 rounded-full bg-accent/10 grid place-items-center text-accent text-lg font-bold shrink-0">${esc((w.en || "?")[0].toUpperCase())}</div>`;
      const ipa = w.pronunciation ? `<span class="text-[11px] text-muted">${esc(w.pronunciation)}</span>` : "";
      const pos = w.part_of_speech ? `<span class="text-[11px] italic text-muted">${esc(w.part_of_speech)}</span>` : "";
      const def = w.definition ? `<p class="text-[13px] text-muted leading-snug mt-1">${richText(w.definition)}</p>` : "";
      const ex = w.example ? `<p class="text-[13px] italic text-ink/80 leading-snug mt-0.5">→ ${richText(w.example)}</p>` : "";
      const ctx = (w.book && w.unit) ? `<div class="text-[10px] text-muted mt-1">Kitob ${w.book} · Unit ${w.unit}</div>` : "";
      return `<article class="flex gap-3 rounded-xl bg-card border p-3 ${on ? "border-emerald-400/40 ring-1 ring-emerald-400/25" : "border-line"}">
        ${img}
        <div class="min-w-0 flex-1">
          <div class="flex items-center flex-wrap gap-x-1.5 gap-y-0.5">
            <h3 class="text-[15px] font-bold text-emerald-400">${esc(w.en)}</h3>${ipa}${pos}
            <button data-en="${esc(w.en)}" class="js-speak ml-auto shrink-0 grid h-7 w-7 place-items-center rounded-full bg-accent/10 text-accent active:scale-90 transition">${speakerSvg}</button>
          </div>
          <p class="text-[13px] font-semibold text-rose-400">${esc(w.uz) || "—"}</p>
          ${def}${ex}${ctx}
        </div>
      </article>`;
    }
    function bindWordCards() {
      contentEl.querySelectorAll(".js-speak").forEach((el) => el.addEventListener("click", (e) => {
        e.stopPropagation();
        speak(el.dataset.en);
      }));
    }

    // ---- KITOBLAR tab ------------------------------------------------------
    function bookCard(b) {
      const grad = BOOK_GRAD[(b.number - 1) % BOOK_GRAD.length];
      const inner = b.cover
        ? `<img src="${b.cover}" alt="" loading="lazy" class="absolute inset-0 h-full w-full object-cover" />`
        : `<span class="text-white/90 text-3xl font-black">${b.number}</span><span class="text-white text-[13px] font-semibold leading-tight line-clamp-3">${esc(b.title)}</span>`;
      return `<button data-id="${b.id}" data-num="${b.number}" data-title="${esc(b.title)}" data-pdf="${b.pdf || ""}" class="js-book text-left">
        <div class="relative aspect-[3/4] rounded-2xl overflow-hidden bg-gradient-to-br ${grad} p-3 flex flex-col justify-between shadow-card">${inner}</div>
        <span class="block mt-1.5 text-[11px] font-medium text-center leading-tight line-clamp-2">${esc(b.title)}</span>
      </button>`;
    }
    async function showBooks() {
      loading(); setHeader("Kitoblar", "4000 Essential Words"); setBack(null);
      const list = await books();
      if (!list.length) return message("Hozircha kitob yo'q.");
      setContent("px-4 py-4 pb-24 grid grid-cols-3 gap-3", list.map(bookCard).join(""));
      contentEl.querySelectorAll(".js-book").forEach((el) => el.addEventListener("click", () =>
        showUnits({ id: el.dataset.id, number: el.dataset.num, title: el.dataset.title, pdf: el.dataset.pdf })));
    }
    // ---- learning adventure: a winding trail of unit "stones" (Duolingo-style) --
    function unitNode(p, u, state, frac) {
      const faceCls = {
        done: "bg-gradient-to-br from-amber-400 to-orange-500 text-white shadow-lg",
        cur: "bg-gradient-to-br from-indigo-500 to-violet-600 text-white shadow-lg",
        progress: "bg-gradient-to-br from-sky-500 to-blue-600 text-white shadow-lg",
        todo: "bg-card border-2 border-line text-muted",
      }[state];
      const inner = state === "done" ? '<span class="text-2xl">⭐</span>'
        : `<span class="text-lg font-black">${u.number}</span>`;
      const C = (2 * Math.PI * 20).toFixed(1);
      const ring = (frac > 0 && frac < 1)
        ? `<svg class="absolute" style="inset:-5px;width:calc(100% + 10px);height:calc(100% + 10px)" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="none" stroke="rgba(148,163,184,.25)" stroke-width="4"/><circle cx="25" cy="25" r="20" fill="none" stroke="#34d399" stroke-width="4" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${(C * (1 - frac)).toFixed(1)}" transform="rotate(-90 25 25)"/></svg>`
        : "";
      return `<button data-id="${u.id}" data-n="${u.number}" class="js-node node-wrap absolute flex flex-col items-center gap-1 ${state === "cur" ? "node-cur" : ""}" style="left:${p.x.toFixed(1)}px;top:${p.y}px;transform:translate(-50%,-50%)">
        <span class="node-face relative grid h-16 w-16 place-items-center rounded-full ${faceCls} a-pop" style="animation-delay:${Math.min(p.i, 12) * 55}ms">${ring}${inner}</span>
        <span class="text-[10px] font-semibold ${state === "todo" ? "text-muted" : "text-ink"} whitespace-nowrap">Unit ${u.number}</span>
      </button>`;
    }
    async function showUnits(book) {
      loading(); setHeader(book.title, "O'quv sayohati"); setBack(showBooks);
      const { units } = await getJSON(`api/units/${book.id}/`);
      const total = units.length;
      const isDone = (u) => u.word_count > 0 && (u.learned || 0) >= u.word_count;
      const doneCount = units.filter(isDone).length;
      let frontier = units.findIndex((u) => !isDone(u));  // first not-yet-completed
      if (frontier < 0) frontier = -1;                    // all done
      const pdf = book.pdf ? `<a href="${book.pdf}" target="_blank" rel="noopener" class="shrink-0 rounded-full bg-card border border-line px-3 py-1.5 text-xs font-semibold text-accent active:scale-95 transition">📥 PDF</a>` : "";
      const STEP = 92, TOP = 54, H = TOP + (total - 1) * STEP + 96;
      setContent("px-4 py-3 pb-24",
        `<div class="flex items-center justify-between mb-2">
           <div class="text-[13px] text-muted"><b class="text-ink">${doneCount}</b>/${total} bo'lim tugallandi 🎯</div>${pdf}
         </div>
         <div id="adv" class="relative mx-auto" style="height:${H}px;max-width:360px"></div>`);
      const box = document.getElementById("adv");
      const W = box.clientWidth || 340, cx = W / 2, amp = Math.min(W * 0.34, 118);
      const pts = units.map((u, i) => ({ u, i, x: cx + Math.sin(i * 0.8) * amp, y: TOP + i * STEP }));
      const d = pts.map((p, i) => `${i ? "L" : "M"} ${p.x.toFixed(1)} ${p.y}`).join(" ");
      let html = `<svg class="absolute inset-0" width="${W}" height="${H}" style="pointer-events:none"><path d="${d}" fill="none" stroke="#2c3552" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="2 9"/></svg>`;
      html += pts.map((p) => {
        const learned = p.u.learned || 0, frac = p.u.word_count ? learned / p.u.word_count : 0;
        const state = isDone(p.u) ? "done" : (p.i === frontier ? "cur" : (learned > 0 ? "progress" : "todo"));
        return unitNode(p, p.u, state, frac);
      }).join("");
      html += `<div class="absolute -translate-x-1/2 text-center" style="left:${cx}px;top:${TOP + total * STEP}px"><div class="text-3xl">${doneCount === total ? "🏆" : "🏁"}</div></div>`;
      box.innerHTML = html;
      box.querySelectorAll(".js-node").forEach((el) => el.addEventListener("click", () =>
        showWords(book, { id: el.dataset.id, number: el.dataset.n })));
    }
    async function showWords(book, unit) {
      loading(); setHeader(`Unit ${unit.number}`, book.title); setBack(() => showUnits(book));
      const { words } = await getJSON(`api/words/${unit.id}/`);
      if (!words.length) return message("So'z topilmadi.");
      setContent("px-4 py-4 pb-24 space-y-3", words.map(wordCard).join(""));
      bindWordCards();
    }

    // ---- MASHQLAR tab ------------------------------------------------------
    async function showGamesHome() {
      loading(); setHeader("Mashqlar", "Kitobni tanlang"); setBack(null);
      const list = await books();
      setContent("px-4 py-4 pb-24 grid grid-cols-3 gap-3", list.map(bookCard).join(""));
      contentEl.querySelectorAll(".js-book").forEach((el) => el.addEventListener("click", () =>
        showGameUnits({ id: el.dataset.id, number: el.dataset.num, title: el.dataset.title })));
    }
    async function showGameUnits(book) {
      loading(); setHeader(book.title, "Bo'limni tanlang"); setBack(showGamesHome);
      const { units } = await getJSON(`api/units/${book.id}/`);
      setContent("px-4 py-4 pb-24 grid grid-cols-6 gap-2",

    // ---- games (client-side; reuse the selected words) ---------------------
    function startQuiz(words, back) {
      const pool = words.filter((w) => w.uz);
      const qs = shuffle(pool).slice(0, 10);
      let i = 0, score = 0;
      setBack(back);
      function render() {
        if (i >= qs.length) return done();
        const w = qs[i];
        const opts = shuffle([w.uz, ...shuffle(pool.filter((x) => x.uz !== w.uz)).slice(0, 3).map((x) => x.uz)]);
        setHeader(`Savol ${i + 1}/${qs.length}`, `Ball: ${score}`);
        setContent("px-4 py-6 pb-24 space-y-3",
          `<div class="text-center mb-3"><div class="text-2xl font-bold tracking-tight">${esc(w.en)}</div><div class="text-xs text-muted">${esc(w.part_of_speech || "")}</div></div>` +
          opts.map((o) => `<button class="js-opt w-full rounded-2xl bg-card border border-line p-3.5 text-left text-[15px]" data-uz="${esc(o)}">${esc(o)}</button>`).join(""));
        contentEl.querySelectorAll(".js-opt").forEach((el) => el.addEventListener("click", () => {
          if (el.dataset.answered) return;
          if (el.dataset.uz === w.uz) score++;
          contentEl.querySelectorAll(".js-opt").forEach((b) => {
            b.dataset.answered = "1";
            if (b.dataset.uz === w.uz) b.classList.add("ring-2", "ring-emerald-400", "a-correct");
            else if (b === el) b.classList.add("ring-2", "ring-rose-400", "a-shake");
          });
          if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred(el.dataset.uz === w.uz ? "success" : "error");
          setTimeout(() => { i++; render(); }, 750);
        }));
      }
      function done() {
        setHeader("Natija", "Test tugadi");
        setContent("px-4 py-16 pb-24 text-center space-y-4",
          `<div class="text-5xl font-bold tracking-tight a-pop">${score}/${qs.length}</div>
           <button id="g-again" class="mt-2 rounded-2xl bg-accent text-accent-ink font-semibold px-6 py-3 active:scale-95 transition">Qaytadan</button>`);
        document.getElementById("g-again").addEventListener("click", () => startQuiz(words, back));
      }
      render();
    }
    function startMatch(words, back) {
      const pool = shuffle(words.filter((w) => w.uz)).slice(0, 6);
      setBack(back); setHeader("Juftlash", "So'zni tarjimasiga ulang");
      const col = (arr, cls, text) => `<div class="space-y-2.5">${arr.map((w) => `<button class="${cls} w-full rounded-xl bg-card border border-line p-3 text-sm" data-id="${w.id}">${esc(text(w))}</button>`).join("")}</div>`;
      setContent("px-4 py-4 pb-24",
        `<div class="grid grid-cols-2 gap-2.5">${col(shuffle(pool.slice()), "js-en font-semibold", (w) => w.en)}${col(shuffle(pool.slice()), "js-uz", (w) => w.uz)}</div><p id="js-mmsg" class="text-center text-sm text-muted mt-5"></p>`);
      let sel = null, done = 0;
      function pick(el, isEn) {
        if (el.disabled) return;
        if (isEn) { contentEl.querySelectorAll(".js-en").forEach((b) => b.classList.remove("ring-2", "ring-accent")); sel = el; el.classList.add("ring-2", "ring-accent"); return; }
        if (!sel) return;
        if (sel.dataset.id === el.dataset.id) {
          [sel, el].forEach((b) => { b.disabled = true; b.classList.remove("ring-2", "ring-accent"); b.classList.add("bg-emerald-500/20", "border-emerald-400/40", "a-pop"); });
          sel = null;
          if (++done === pool.length) document.getElementById("js-mmsg").textContent = "✅ Barchasi to'g'ri! 🎉";
        } else {
          const pair = [sel, el]; pair.forEach((b) => b.classList.add("ring-2", "ring-rose-400", "a-shake"));
          if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("error");
          setTimeout(() => pair.forEach((b) => b.classList.remove("ring-2", "ring-rose-400", "ring-accent", "a-shake")), 450);
          sel = null;
        }
      }
      contentEl.querySelectorAll(".js-en").forEach((el) => el.addEventListener("click", () => pick(el, true)));
      contentEl.querySelectorAll(".js-uz").forEach((el) => el.addEventListener("click", () => pick(el, false)));
    }
    function startSpell(words, back) {
      const qs = shuffle(words.filter((w) => w.uz && w.en)).slice(0, 10);
      let i = 0, score = 0;
      setBack(back);
      function render() {
        if (i >= qs.length) return done();
        const w = qs[i];
        setHeader(`Yozish ${i + 1}/${qs.length}`, `Ball: ${score}`);
        setContent("px-4 py-6 pb-24 space-y-4",
          `<div class="text-center"><div class="text-xl font-semibold">${esc(w.uz)}</div>${w.definition ? `<div class="text-xs text-muted mt-1">${esc(w.definition)}</div>` : ""}</div>
           <input id="sp" type="text" autocomplete="off" autocapitalize="off" autocorrect="off" enterkeyhint="done" placeholder="Inglizcha yozing…" class="w-full rounded-2xl bg-card border border-line px-4 py-3 text-[15px] text-ink outline-none" />
           <button id="sp-check" class="w-full rounded-2xl bg-accent text-accent-ink font-semibold py-3">Tekshirish</button>
           <p id="sp-res" class="text-center text-sm"></p>`);
        const input = document.getElementById("sp"); input.focus();
        function check() {
          if (input.disabled) return;
          const ok = input.value.trim().toLowerCase() === w.en.toLowerCase();
          if (ok) score++;
          input.disabled = true;
          input.classList.add("ring-2", ok ? "ring-emerald-400" : "ring-rose-400", ok ? "a-correct" : "a-shake");
          document.getElementById("sp-res").innerHTML = ok ? '<span class="text-emerald-400">✅ To\'g\'ri</span>' : `<span class="text-rose-400">❌ ${esc(w.en)}</span>`;
          if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred(ok ? "success" : "error");
          setTimeout(() => { i++; render(); }, 900);
        }
        document.getElementById("sp-check").addEventListener("click", check);
        input.addEventListener("keydown", (e) => { if (e.key === "Enter") check(); });
      }
      function done() {
        setHeader("Natija", "Yozish tugadi");
        setContent("px-4 py-16 pb-24 text-center space-y-4",
          `<div class="text-5xl font-bold tracking-tight a-pop">${score}/${qs.length}</div><button id="sp-again" class="mt-2 rounded-2xl bg-accent text-accent-ink font-semibold px-6 py-3 active:scale-95 transition">Qaytadan</button>`);
        document.getElementById("sp-again").addEventListener("click", () => startSpell(words, back));
      }
      render();
    }
    // ---- speed round: answer as many as possible in 30s --------------------
    function startSpeed(words, back) {
      const pool = words.filter((w) => w.uz);
      if (pool.length < 4) return message("O'yin uchun so'z yetarli emas.");
      let score = 0, left = 30, alive = true, queue = [];
      const stop = () => { alive = false; clearInterval(timer); };
      const timer = setInterval(() => {
        if (!alive) return;
        if (--left <= 0) { stop(); return finish(); }
        setHeader(`⏱ ${left}s`, `Ball: ${score}`);
      }, 1000);
      setBack(() => { stop(); back(); });
      const nextWord = () => { if (!queue.length) queue = shuffle(pool.slice()); return queue.pop(); };
      function render() {
        if (!alive) return;
        const w = nextWord();
        const opts = shuffle([w.uz, ...shuffle(pool.filter((x) => x.uz !== w.uz)).slice(0, 3).map((x) => x.uz)]);
        setHeader(`⏱ ${left}s`, `Ball: ${score}`);
        setContent("px-4 py-6 pb-24 space-y-3",
          `<div class="text-center mb-3"><div class="text-2xl font-bold tracking-tight">${esc(w.en)}</div><div class="text-xs text-muted">${esc(w.part_of_speech || "")}</div></div>` +
          opts.map((o) => `<button class="js-sopt w-full rounded-2xl bg-card border border-line p-3.5 text-left text-[15px]" data-uz="${esc(o)}">${esc(o)}</button>`).join(""));
        contentEl.querySelectorAll(".js-sopt").forEach((el) => el.addEventListener("click", () => {
          if (!alive) return;
          const ok = el.dataset.uz === w.uz;
          if (ok) score++; else left = Math.max(1, left - 2); // wrong answer costs 2s
          if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred(ok ? "success" : "error");
          render();
        }));
      }
      function finish() {
        setHeader("Natija", "Vaqt tugadi");
        setContent("px-4 py-16 pb-24 text-center space-y-4",
          `<div class="text-5xl font-bold tracking-tight a-pop">${score}</div><div class="text-sm text-muted">to'g'ri javob</div>
           <button id="spd-again" class="mt-2 rounded-2xl bg-accent text-accent-ink font-semibold px-6 py-3 active:scale-95 transition">Qaytadan</button>`);
        document.getElementById("spd-again").addEventListener("click", () => startSpeed(words, back));
      }
      render();
    }
    // ---- memory: flip cards, find the en↔uz pairs --------------------------
    function startMemory(words, back) {
      const pairs = shuffle(words.filter((w) => w.uz && w.en)).slice(0, 6);
      if (pairs.length < 4) return message("O'yin uchun so'z yetarli emas.");
      setBack(back); setHeader("Xotira", "Juftlarni oching");
      const cards = shuffle(pairs.flatMap((w, pid) => [{ pid, text: w.en }, { pid, text: w.uz }]));
      let first = null, lock = false, matched = 0;
      setContent("px-4 py-4 pb-24",
        `<div class="grid grid-cols-3 gap-2">${cards.map((c, idx) =>
          `<button data-idx="${idx}" data-pid="${c.pid}" data-text="${esc(c.text)}" class="js-card aspect-square grid place-items-center rounded-xl bg-card border border-line text-sm font-semibold px-1 text-center">?</button>`).join("")}</div>
         <p id="mem-msg" class="text-center text-sm text-muted mt-4"></p>`);
      const show = (el) => { el.textContent = el.dataset.text; el.classList.add("ring-2", "ring-accent", "a-flip"); };
      const hide = (el) => { el.textContent = "?"; el.classList.remove("ring-2", "ring-accent", "a-flip"); };
      contentEl.querySelectorAll(".js-card").forEach((el) => el.addEventListener("click", () => {
        if (lock || el.disabled || el === first) return;
        show(el);
        if (!first) { first = el; return; }
        if (first.dataset.pid === el.dataset.pid) {
          [first, el].forEach((b) => { b.disabled = true; b.classList.remove("ring-2", "ring-accent", "a-flip"); b.classList.add("bg-emerald-500/20", "border-emerald-400/40", "a-pop"); });
          if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("success");
          first = null;
          if (++matched === pairs.length) document.getElementById("mem-msg").textContent = "✅ Yakunlandi! 🎉";
        } else {
          lock = true;
          if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred("error");
          const pair = [first, el];
          setTimeout(() => { pair.forEach(hide); first = null; lock = false; }, 700);
        }
      }));
    }
    // ---- speech: say the word aloud, the browser checks your pronunciation --
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    const normEn = (s) => (s || "").toLowerCase().replace(/[^a-z\s]/g, "").trim();
    function startSpeech(words, back) {
      setBack(back);
      if (!SpeechRec) {
        return message("😔 Bu qurilma ovozli tanishni qo'llab-quvvatlamaydi. Chrome brauzerida oching.");
      }
      const qs = shuffle(words.filter((w) => w.en)).slice(0, 10);
      let i = 0, score = 0;
      function render() {
        if (i >= qs.length) return done();
        const w = qs[i];
        setHeader(`Talaffuz ${i + 1}/${qs.length}`, `Ball: ${score}`);
        setContent("px-4 py-8 pb-24 text-center space-y-3",
          `<div class="text-3xl font-bold tracking-tight">${esc(w.en)}</div>
           <div class="text-sm text-muted">${esc(w.pronunciation || "")}</div>
           <button id="spk-hear" class="rounded-full bg-card border border-line px-4 py-2 text-sm text-accent active:scale-95 transition">🔊 Tinglash</button>
           <div class="pt-5">
             <button id="spk-mic" class="mx-auto grid h-24 w-24 place-items-center rounded-full bg-accent text-accent-ink text-4xl active:scale-95 transition">🎤</button>
             <div class="text-xs text-muted mt-3">Tugmani bosib, so'zni ayting</div>
           </div>
           <p id="spk-res" class="text-sm min-h-[1.5em]"></p>`);
        document.getElementById("spk-hear").addEventListener("click", () => speak(w.en));
        const mic = document.getElementById("spk-mic"), res = document.getElementById("spk-res");
        let busy = false;
        mic.addEventListener("click", () => {
          if (busy) return;
          busy = true;
          const rec = new SpeechRec();
          rec.lang = "en-US"; rec.interimResults = false; rec.maxAlternatives = 5;
          mic.classList.add("a-listen"); res.textContent = "🎙 Tinglanmoqda…"; res.className = "text-sm text-muted min-h-[1.5em]";
          rec.onresult = (e) => {
            const alts = [...e.results[0]].map((r) => normEn(r.transcript));
            const target = normEn(w.en);
            const ok = alts.some((a) => a === target || a.split(" ").includes(target));
            mic.classList.remove("a-listen");
            if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred(ok ? "success" : "error");
            if (ok) {
              score++;
              res.innerHTML = '<span class="text-emerald-400">✅ To\'g\'ri talaffuz!</span>';
              mic.classList.add("a-correct");
              setTimeout(() => { i++; render(); }, 1100);
            } else {
              res.innerHTML = `<span class="text-rose-400">❌ Eshitildi: "${esc(alts[0] || "—")}"</span> — qayta urining`;
              mic.classList.add("a-shake");
              setTimeout(() => mic.classList.remove("a-shake"), 500);
              busy = false;
            }
          };
          rec.onerror = (e) => {
            mic.classList.remove("a-listen");
            const msg = e.error === "not-allowed" ? "Mikrofonga ruxsat bering" : "Ovoz eshitilmadi";
            res.innerHTML = `<span class="text-rose-400">${msg} — qayta urining</span>`;
            busy = false;
          };
          try { rec.start(); } catch (err) { mic.classList.remove("a-listen"); busy = false; }
        });
      }
      function done() {
        setHeader("Natija", "Talaffuz tugadi");
        setContent("px-4 py-16 pb-24 text-center space-y-4",
          `<div class="text-5xl font-bold tracking-tight a-pop">${score}/${qs.length}</div>
           <button id="spk-again" class="mt-2 rounded-2xl bg-accent text-accent-ink font-semibold px-6 py-3 active:scale-95 transition">Qaytadan</button>`);
        document.getElementById("spk-again").addEventListener("click", () => startSpeech(words, back));
      }
      render();
    }
    // ---- shadowing: hear the example sentence, then repeat (shadow) it ------
    function startShadow(words, back) {
      setBack(back);
      if (!SpeechRec) {
        return message("😔 Bu qurilma ovozli tanishni qo'llab-quvvatlamaydi. Chrome brauzerida oching.");
      }
      const pool = words.filter((w) => w.example);
      if (!pool.length) return message("Bu bo'limda takrorlash uchun misol yo'q.");
      const qs = shuffle(pool).slice(0, 8);
      let i = 0, score = 0;
      const wordsOf = (s) => (s || "").toLowerCase().replace(/<[^>]+>/g, "").replace(/[^a-z\s]/g, "").split(/\s+/).filter(Boolean);
      function render() {
        if (i >= qs.length) return done();
        const sentence = qs[i].example.replace(/<[^>]+>/g, "").trim();
        const sentTokens = sentence.split(/\s+/);
        setHeader(`Shadowing ${i + 1}/${qs.length}`, `Ball: ${score}`);
        setContent("px-4 py-6 pb-24 text-center space-y-3",
          `<div id="sh-sentence" class="rounded-2xl bg-card border border-line p-4 text-[15px] leading-relaxed">${sentTokens.map((t, idx) => `<span data-w="${idx}">${esc(t)}</span>`).join(" ")}</div>
           <button id="sh-hear" class="rounded-full bg-card border border-line px-4 py-2 text-sm text-accent active:scale-95 transition">🔊 Eshitish</button>
           <div class="pt-3">
             <button id="sh-mic" class="mx-auto grid h-24 w-24 place-items-center rounded-full bg-accent text-accent-ink text-4xl active:scale-95 transition">🎤</button>
             <div class="text-xs text-muted mt-3">Eshiting, keyin bosib takrorlang</div>
           </div>
           <p id="sh-res" class="text-sm min-h-[1.5em]"></p>`);
        speak(sentence);  // auto-play the model once
        document.getElementById("sh-hear").addEventListener("click", () => speak(sentence));
        const mic = document.getElementById("sh-mic"), res = document.getElementById("sh-res");
        const target = wordsOf(sentence);
        let busy = false;
        mic.addEventListener("click", () => {
          if (busy) return;
          busy = true;
          const rec = new SpeechRec();
          rec.lang = "en-US"; rec.interimResults = false; rec.maxAlternatives = 1;
          mic.classList.add("a-listen"); res.textContent = "🎙 Tinglanmoqda…"; res.className = "text-sm text-muted min-h-[1.5em]";
          rec.onresult = (e) => {
            const heardSet = new Set(wordsOf(e.results[0][0].transcript));
            sentTokens.forEach((tok, idx) => {  // colour each word: caught (green) vs missed (dim)
              const c = tok.toLowerCase().replace(/[^a-z]/g, "");
              const span = document.querySelector(`#sh-sentence [data-w="${idx}"]`);
              if (span && c) span.className = heardSet.has(c) ? "text-emerald-400 font-semibold" : "text-muted";
            });
            const matched = target.filter((t) => heardSet.has(t)).length;
            const ratio = target.length ? matched / target.length : 0;
            const ok = ratio >= 0.6;
            mic.classList.remove("a-listen");
            if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred(ok ? "success" : "error");
            const pct = Math.round(ratio * 100);
            if (ok) {
              score++;
              res.innerHTML = `<span class="text-emerald-400">✅ Zo'r! ${matched}/${target.length} so'z (${pct}%)</span>`;
              mic.classList.add("a-correct");
              setTimeout(() => { i++; render(); }, 1200);
            } else {
              res.innerHTML = `<span class="text-rose-400">${matched}/${target.length} so'z (${pct}%)</span> — yana urining`;
              mic.classList.add("a-shake");
              setTimeout(() => mic.classList.remove("a-shake"), 500);
              busy = false;
            }
          };
          rec.onerror = (e) => {
            mic.classList.remove("a-listen");
            const msg = e.error === "not-allowed" ? "Mikrofonga ruxsat bering" : "Ovoz eshitilmadi";
            res.innerHTML = `<span class="text-rose-400">${msg} — qayta urining</span>`;
            busy = false;
          };
          try { rec.start(); } catch (err) { mic.classList.remove("a-listen"); busy = false; }
        });
      }
      function done() {
        setHeader("Natija", "Shadowing tugadi");
        setContent("px-4 py-16 pb-24 text-center space-y-4",
          `<div class="text-5xl font-bold tracking-tight a-pop">${score}/${qs.length}</div>
           <button id="sh-again" class="mt-2 rounded-2xl bg-accent text-accent-ink font-semibold px-6 py-3 active:scale-95 transition">Qaytadan</button>`);
        document.getElementById("sh-again").addEventListener("click", () => startShadow(words, back));
      }
      render();
    }

    // ---- search (Kitoblar tab) --------------------------------------------
    let searchTimer = null, searchActive = false;
    async function runSearch(q) {
      const { words } = await getJSON(`api/search/?q=${encodeURIComponent(q)}`);
      if (!searchActive) return;
      setHeader("Qidiruv", `"${q}" — ${words.length} natija`); setBack(exitSearch);
      if (!words.length) return message("Hech narsa topilmadi.");
      setContent("px-4 py-4 pb-24 space-y-3", words.map(wordCard).join("")); bindWordCards();
    }
    function exitSearch() { searchActive = false; searchEl.value = ""; showBooks(); }
    searchEl.addEventListener("input", () => {
      const q = searchEl.value.trim(); clearTimeout(searchTimer);
      if (q.length < 2) { if (searchActive) exitSearch(); return; }
      searchActive = true; searchTimer = setTimeout(() => runSearch(q), 220);
    });

    // ---- tab bar -----------------------------------------------------------
    function setTab(next) {
      tab = next; searchActive = false; searchEl.value = "";
      searchbarEl.style.display = next === "books" ? "" : "none";
      document.querySelectorAll(".js-tab").forEach((el) =>
        el.classList.toggle("text-accent", el.dataset.tab === next) || el.classList.toggle("text-muted", el.dataset.tab !== next));
      if (next === "books") showBooks();
      else if (next === "today") showToday();
      else if (next === "games") showGamesHome();
      else showProfile();
    }
    document.querySelectorAll(".js-tab").forEach((el) => el.addEventListener("click", () => setTab(el.dataset.tab)));

    const _view = new URLSearchParams(location.search).get("view");
    loadLearned(() => setTab(_view === "today" ? "today" : "books"));
  </script>
</body>
</html>
